defaults:
  - encoder1: bert_entity
  - encoder2: none
  - dataset: semeval2010
  - _self_

mlflow:
  experiment_name: combine_embeddings_experiment
  tracking_uri: null

training:
  # Classifier type: "softmax_mlp" (gradient-based MLP, default),
  # "xgboost" (XGBoost multi-class), or "lightgbm" (LightGBM multi-class).
  # Sklearn classifiers (xgboost / lightgbm) skip the epoch loop and fit
  # directly on encoder embeddings — max_epoch, opt, and lr are ignored.
  model_type: softmax_mlp
  lr: 2.0e-5
  max_epoch: 100
  batch_size: 64
  num_mlp_layers: 3
  dropout: 0.1
  opt: adamw
  weight_decay: 1e-5
  warmup_step: 0
  seed: 42
  patience: 3
  no_validation: false  # true → use 100% of train data; test set used only for final metrics

device: cuda

vector_db:
  enabled: true       # true → pre-compute embeddings once, train MLP head on tensors
  hybrid_mode: false  # true → pre-compute only encoder2; encoder1 runs on-the-fly (trainable)
  enc2_train_stem: null  # hybrid only: path stem to existing enc2 train VDB (skips generation)
  enc2_test_stem: null   # hybrid only: path stem to existing enc2 test VDB (skips generation)
  batch_size: null    # generation batch size; falls back to training.batch_size if null
  save_dir: embeddings      # if set, VectorDatabases are saved to this directory
  fit_pipeline: false # if true, fit StandardScaler → PCA(0.95) → L2 Norm on train embeddings
  faiss_device: null  # FAISS index device: null → inherit global `device`; or "cpu"/"cuda"/"cuda:N"
