defaults:
  - encoder1: llm
  - encoder2: none
  - dataset: semeval2010
  - _self_

mlflow:
  experiment_name: combine_embeddings_experiment
  tracking_uri: null

training:
  # Classifier type: "softmax_mlp" (gradient-based MLP, default),
  # "xgboost" (XGBoost multi-class), or "lightgbm" (LightGBM multi-class).
  # Sklearn classifiers (xgboost / lightgbm) skip the epoch loop and fit
  # directly on encoder embeddings — max_epoch, opt, and lr are ignored.
  model_type: softmax_mlp
  lr: 2.0e-5
  max_epoch: 3
  batch_size: 64
  num_mlp_layers: 3
  dropout: 0.1
  opt: adamw
  weight_decay: 1e-5
  warmup_step: 0
  seed: 42
  patience: 3

device: cuda

vector_db:
  enabled: false      # true → pre-compute embeddings once, train MLP head on tensors
  batch_size: null    # generation batch size; falls back to training.batch_size if null
  save_dir: null      # if set, VectorDatabases are saved to this directory
