defaults:
  - encoder1: relation
  - encoder2: bow_sdp
  - dataset: semeval2010
  - _self_

mlflow:
  experiment_name: combine_embeddings_experiment
  tracking_uri: null

training:
  lr: 2.0e-5
  max_epoch: 3
  batch_size: 64
  num_mlp_layers: 3
  dropout: 0.1
  opt: sgd
  weight_decay: 1e-5
  warmup_step: 300
  seed: 42
  patience: 3

device: cuda
