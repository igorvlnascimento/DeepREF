defaults:
  - model: bert
  - dataset: semeval2010
  - _self_

mlflow:
  experiment_name: fine_tuner_experiment
  tracking_uri: null

training:
  num_train_epochs: 5
  per_device_train_batch_size: 16
  per_device_eval_batch_size: 16
  learning_rate: 2.0e-5
  weight_decay: 1e-5
  warmup_steps: 0
  bf16: True
  optim: adamw_torch_fused
  eval_strategy: epoch
  save_strategy: epoch
  load_best_model_at_end: true
  metric_for_best_model: f1
  greater_is_better: true
  seed: 42
  report_to:
    - mlflow

# Set use_lora: false to perform full fine-tuning (lora settings are ignored).
use_lora: false

lora:
  r: 8
  lora_alpha: 16
  lora_dropout: 0.1
  bias: none
  task_type: SEQ_CLS
